<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bon de Transport</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    var(--tg-theme-bg-color, #ffffff);
      --bg2:   var(--tg-theme-secondary-bg-color, #f2f2f7);
      --text:  var(--tg-theme-text-color, #000000);
      --hint:  var(--tg-theme-hint-color, #8e8e93);
      --btn:   var(--tg-theme-button-color, #007aff);
      --btnT:  var(--tg-theme-button-text-color, #ffffff);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
      padding: 12px 16px 90px;
    }

    .header { text-align: center; padding: 16px 0 20px; }
    .header .icon { font-size: 2.2rem; margin-bottom: 6px; }
    .header h1 { font-size: 1.25rem; font-weight: 700; }
    .header p  { font-size: 0.82rem; color: var(--hint); margin-top: 3px; }

    .card { background: var(--bg); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
    .card-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--hint); margin-bottom: 10px;
    }

    .field-input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid transparent; border-radius: 10px;
      background: var(--bg2); color: var(--text);
      font-size: 1.05rem; font-weight: 600; outline: none;
      transition: border-color .15s; -moz-appearance: textfield;
    }
    .field-input::-webkit-inner-spin-button,
    .field-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .field-input:focus { border-color: var(--btn); }
    .field-input::placeholder { color: var(--hint); font-weight: 400; }
    .field-input.error { border-color: #ff3b30 !important; }

    /* Date */
    .date-row { display: grid; grid-template-columns: 1fr 1fr 1.4fr; gap: 8px; }
    .date-cell { display: flex; flex-direction: column; gap: 5px; }
    .date-cell-lbl {
      font-size: 0.68rem; text-align: center; color: var(--hint);
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .date-input {
      width: 100%; padding: 10px 4px;
      border: 1.5px solid transparent; border-radius: 10px;
      background: var(--bg2); color: var(--text);
      font-size: 1.2rem; font-weight: 700; text-align: center; outline: none;
      -moz-appearance: textfield;
    }
    .date-input::-webkit-inner-spin-button,
    .date-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .date-input:focus { border-color: var(--btn); }
    .date-input.error { border-color: #ff3b30 !important; }

    /* Shift */
    .shift-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .shift-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 12px 8px; border: 2px solid transparent; border-radius: 12px;
      background: var(--bg2); color: var(--hint);
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all .15s; -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .shift-btn .ico { font-size: 1.6rem; }
    .shift-btn.active { background: var(--btn); color: var(--btnT); border-color: var(--btn); }

    /* HV chips */
    .hv-scroll {
      display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .hv-scroll::-webkit-scrollbar { display: none; }
    .hv-chip {
      flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
      background: var(--bg2); color: var(--hint);
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      border: 2px solid transparent; transition: all .12s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .hv-chip.active { background: var(--btn); color: var(--btnT); border-color: var(--btn); }
    .hv-error { border: 2px solid #ff3b30; border-radius: 12px; padding: 4px; margin-top: -4px; }

    /* Erreurs inline */
    .err-msg {
      font-size: 0.75rem; color: #ff3b30; font-weight: 600;
      margin-top: 5px; display: none;
    }
    .err-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">📋</div>
    <h1>Bon de Transport</h1>
    <p>Vérifiez et complétez les informations</p>
  </div>

  <!-- N° de Bon -->
  <div class="card">
    <div class="card-label">🎫 Numéro de bon</div>
    <input id="bon" class="field-input" type="text" inputmode="numeric"
           placeholder="ex : 00123" autocomplete="off">
    <div class="err-msg" id="err-bon">⚠️ Numéro de bon requis</div>
  </div>

  <!-- Date -->
  <div class="card">
    <div class="card-label">📅 Date</div>
    <div class="date-row">
      <div class="date-cell">
        <div class="date-cell-lbl">Jour</div>
        <input id="day" class="date-input" type="number" inputmode="numeric" min="1" max="31" placeholder="JJ">
      </div>
      <div class="date-cell">
        <div class="date-cell-lbl">Mois</div>
        <input id="month" class="date-input" type="number" inputmode="numeric" min="1" max="12" placeholder="MM">
      </div>
      <div class="date-cell">
        <div class="date-cell-lbl">Année</div>
        <input id="year" class="date-input" type="number" inputmode="numeric" min="2024" max="2099" placeholder="AAAA">
      </div>
    </div>
    <div class="err-msg" id="err-date">⚠️ Date invalide</div>
  </div>

  <!-- Shift -->
  <div class="card">
    <div class="card-label">⏰ Shift</div>
    <div class="shift-row">
      <div class="shift-btn active" id="btn-day" onclick="setShift('day')">
        <span class="ico">☀️</span>
        <span>Jour</span>
        <small style="font-weight:400;font-size:0.72rem">7h – 19h</small>
      </div>
      <div class="shift-btn" id="btn-night" onclick="setShift('night')">
        <span class="ico">🌙</span>
        <span>Nuit</span>
        <small style="font-weight:400;font-size:0.72rem">19h – 7h</small>
      </div>
    </div>
  </div>

  <!-- Véhicule -->
  <div class="card">
    <div class="card-label">🚛 Véhicule</div>
    <div class="hv-scroll" id="hv-scroll"></div>
    <div class="err-msg" id="err-hv">⚠️ Sélectionnez un véhicule</div>
  </div>

  <!-- Quantité -->
  <div class="card">
    <div class="card-label">⚖️ Quantité</div>
    <input id="tonnes" class="field-input" type="number" inputmode="numeric"
           min="20000" max="100000" placeholder="ex : 45000"
           style="font-size:1.4rem;font-weight:700;text-align:center;">
    <div class="err-msg" id="err-qty">⚠️ Quantité entre 20 000 et 100 000</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);

    document.getElementById('bon').value    = params.get('bon')    || '';
    document.getElementById('day').value    = params.get('day')    || '';
    document.getElementById('month').value  = params.get('month')  || '';
    document.getElementById('year').value   = params.get('year')   || '';
    document.getElementById('tonnes').value = params.get('tonnes') || '';

    /* Shift */
    let currentShift = params.get('shift') || 'day';
    function setShift(val) {
      currentShift = val;
      document.getElementById('btn-day').classList.toggle('active', val === 'day');
      document.getElementById('btn-night').classList.toggle('active', val === 'night');
    }
    setShift(currentShift);

    /* HV chips */
    const hvList = ['HV-01','HV-02','HV-03','HV-04','HV-05',
                    'HV-06','HV-07','HV-08','HV-09','HV-10'];
    let currentHv = params.get('hv') || '';
    const scroll  = document.getElementById('hv-scroll');
    hvList.forEach(hv => {
      const chip = document.createElement('div');
      chip.className = 'hv-chip' + (hv === currentHv ? ' active' : '');
      chip.textContent = hv;
      chip.onclick = () => {
        currentHv = hv;
        scroll.querySelectorAll('.hv-chip').forEach(c =>
          c.classList.toggle('active', c.textContent === hv));
        scroll.querySelector('.hv-chip.active')
              ?.scrollIntoView({ inline: 'center', behavior: 'smooth' });
        document.getElementById('hv-scroll').classList.remove('hv-error');
        showErr('err-hv', false);
      };
      scroll.appendChild(chip);
    });
    const activeChip = scroll.querySelector('.hv-chip.active');
    if (activeChip) activeChip.scrollIntoView({ inline: 'center', behavior: 'instant' });

    /* Erreurs */
    function showErr(id, show) { document.getElementById(id).classList.toggle('visible', show); }
    function setFieldErr(el, show) { el.classList.toggle('error', show); }
    function clearAll() {
      document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
      document.querySelectorAll('.err-msg').forEach(el => el.classList.remove('visible'));
      document.getElementById('hv-scroll').classList.remove('hv-error');
    }

    ['bon','day','month','year','tonnes'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id).classList.remove('error');
        const errId = id === 'tonnes' ? 'err-qty' : id === 'bon' ? 'err-bon' : 'err-date';
        showErr(errId, false);
      });
    });

    /* Validation */
    function validate() {
      clearAll();
      let hasError = false;

      const bonEl = document.getElementById('bon');
      if (!bonEl.value.trim()) { setFieldErr(bonEl, true); showErr('err-bon', true); hasError = true; }

      const dayEl = document.getElementById('day'), monEl = document.getElementById('month'), yrEl = document.getElementById('year');
      const day = parseInt(dayEl.value), month = parseInt(monEl.value), year = parseInt(yrEl.value);
      if (!(day >= 1 && day <= 31 && month >= 1 && month <= 12 && year >= 2024 && year <= 2099)) {
        if (!day   || day   < 1   || day   > 31)   setFieldErr(dayEl, true);
        if (!month || month < 1   || month > 12)   setFieldErr(monEl, true);
        if (!year  || year  < 2024 || year > 2099) setFieldErr(yrEl,  true);
        showErr('err-date', true); hasError = true;
      }

      if (!currentHv) {
        document.getElementById('hv-scroll').classList.add('hv-error');
        showErr('err-hv', true); hasError = true;
      }

      const tonEl  = document.getElementById('tonnes');
      const tonnes = parseFloat(String(tonEl.value).replace(',', '.'));
      if (isNaN(tonnes) || tonnes < 20000 || tonnes > 100000) {
        setFieldErr(tonEl, true); showErr('err-qty', true); hasError = true;
      }

      if (hasError) return null;

      return {
        bon:   bonEl.value.trim(),
        day, month, year,
        shift: currentShift,
        hv:    currentHv,
        tonnes,
        fid:   params.get('fid') || '',
        mid:   params.get('mid') || ''
      };
    }

    tg.MainButton.setText('✅  Confirmer').show();
    tg.MainButton.onClick(function () {
      const data = validate();
      if (!data) return;
      tg.sendData(JSON.stringify(data));
    });
  </script>
</body>
</html>
